name: Build TAZALARM APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Run unit tests
        run: gradle --no-daemon :app:testReleaseUnitTest

      - name: Build signed release APK
        run: gradle --no-daemon clean :app:assembleRelease

      - name: Verify APK signature
        shell: bash
        run: |
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare installable APK
        run: cp app/build/outputs/apk/release/app-release.apk TAZALARM-v2.1.0.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: TAZALARM-v2.1.0-installable-APK
          path: TAZALARM-v2.1.0.apk
          if-no-files-found: error
          retention-days: 30
